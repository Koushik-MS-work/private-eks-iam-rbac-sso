<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<title>IAM identity to Kubernetes RBAC namespace mapping</title>
<defs>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="60" y="30" width="260" height="50" rx="10" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="190" y="49" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">Second user</text>
<text x="190" y="67" font-size="12" fill="#3C3489" text-anchor="middle">Assumes EKSDeveloper SSO role</text>
<line x1="190" y1="80" x2="190" y2="118" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow2)"/>

<rect x="60" y="120" width="260" height="50" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="190" y="139" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">K8s group</text>
<text x="190" y="157" font-size="12" fill="#085041" text-anchor="middle">dev-namespace-users</text>
<line x1="190" y1="170" x2="190" y2="208" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow2)"/>

<rect x="60" y="210" width="260" height="60" rx="10" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
<text x="190" y="231" font-size="14" font-weight="bold" fill="#173404" text-anchor="middle">dev namespace RBAC</text>
<text x="190" y="249" font-size="12" fill="#3B6D11" text-anchor="middle">Full access, scoped only here</text>

<rect x="360" y="30" width="260" height="50" rx="10" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="490" y="49" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">Read-only principal</text>
<text x="490" y="67" font-size="12" fill="#3C3489" text-anchor="middle">Optional second IAM ARN</text>
<line x1="490" y1="80" x2="490" y2="118" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow2)"/>

<rect x="360" y="120" width="260" height="50" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="490" y="139" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">K8s group</text>
<text x="490" y="157" font-size="12" fill="#085041" text-anchor="middle">staging-namespace-viewers</text>
<line x1="490" y1="170" x2="490" y2="208" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow2)"/>

<rect x="360" y="210" width="260" height="60" rx="10" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
<text x="490" y="231" font-size="14" font-weight="bold" fill="#173404" text-anchor="middle">staging namespace RBAC</text>
<text x="490" y="249" font-size="12" fill="#3B6D11" text-anchor="middle">Read-only, view only</text>

<text x="340" y="305" font-size="12" fill="#5F5E5A" text-anchor="middle">Same pattern extends to prod — one group, one Role, one namespace</text>
</svg>
