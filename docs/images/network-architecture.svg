<svg width="680" height="510" viewBox="0 0 680 510" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<title>Private EKS cluster network and access architecture</title>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="90" y="90" width="520" height="400" rx="20" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="110" y="118" font-size="14" font-weight="bold" fill="#2C2C2A">AWS account</text>
<text x="110" y="134" font-size="12" fill="#5F5E5A">ap-south-1</text>

<rect x="120" y="150" width="300" height="270" rx="16" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
<text x="140" y="176" font-size="14" font-weight="bold" fill="#173404">VPC — private only</text>
<text x="140" y="192" font-size="12" fill="#3B6D11">No public API endpoint</text>

<rect x="140" y="210" width="260" height="60" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="270" y="230" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">EKS control plane</text>
<text x="270" y="248" font-size="12" fill="#085041" text-anchor="middle">Private endpoint only</text>

<rect x="140" y="280" width="260" height="50" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="270" y="298" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">Managed node group</text>
<text x="270" y="314" font-size="12" fill="#085041" text-anchor="middle">Private subnets, 3 AZs</text>

<rect x="140" y="340" width="260" height="50" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="270" y="358" font-size="14" font-weight="bold" fill="#04342C" text-anchor="middle">Bastion (SSM)</text>
<text x="270" y="374" font-size="12" fill="#085041" text-anchor="middle">No public IP, no SSH keys</text>

<rect x="440" y="210" width="150" height="80" rx="10" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="515" y="238" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">IAM Identity Center</text>
<text x="515" y="258" font-size="12" fill="#3C3489" text-anchor="middle">SSO permission set</text>

<rect x="440" y="320" width="150" height="70" rx="10" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="515" y="345" font-size="14" font-weight="bold" fill="#26215C" text-anchor="middle">EKS access entry</text>
<text x="515" y="363" font-size="12" fill="#3C3489" text-anchor="middle">Maps IAM to K8s group</text>

<rect x="440" y="30" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="515" y="47" font-size="14" font-weight="bold" fill="#2C2C2A" text-anchor="middle">Second user</text>
<text x="515" y="63" font-size="12" fill="#5F5E5A" text-anchor="middle">AWS SSO login</text>

<rect x="5" y="345" width="75" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="42" y="369" font-size="12" fill="#2C2C2A" text-anchor="middle">You (admin)</text>

<line x1="515" y1="74" x2="515" y2="208" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="515" y1="290" x2="515" y2="318" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M440 355 L410 355 L410 240 L402 240" fill="none" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M80 365 L140 365" fill="none" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
